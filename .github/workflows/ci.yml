name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cache
        uses: Swatinem/rust-cache@v2

      - name: build
        run: cargo build --verbose

      - name: test
        run: cargo test --verbose

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cache
        uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy -- -D warnings

  luarocks:
    name: luarocks integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable

      - name: cache
        uses: Swatinem/rust-cache@v2

      - name: install lua and luarocks
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 luarocks

      - name: install argparse
        run: luarocks install argparse

      - name: run luarocks tests
        run: cargo test -- --include-ignored

  release:
    name: release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable

      - name: cache
        uses: Swatinem/rust-cache@v2

      - name: build release
        run: cargo build --release

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lunar-bundler-linux
          path: target/release/lunar-bundler